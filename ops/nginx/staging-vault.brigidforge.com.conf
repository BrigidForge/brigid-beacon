# Nginx server block for staging-vault.brigidforge.com (Vault UI — staging)
#
# Install:
#   cp ops/nginx/staging-vault.brigidforge.com.conf /etc/nginx/sites-available/staging-vault.brigidforge.com
#   ln -s /etc/nginx/sites-available/staging-vault.brigidforge.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Run the deploy script with staging roots:
#   VAULT_ROOT=/var/www/staging-vault \
#   VAULT_HEALTH_URL=https://staging-vault.brigidforge.com/ \
#   DEPLOY_ENV=staging \
#   bash scripts/deploy-hosted.sh

server {
    listen 80;
    listen [::]:80;
    server_name staging-vault.brigidforge.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging-vault.brigidforge.com;

    ssl_certificate     /etc/letsencrypt/live/staging-vault.brigidforge.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-vault.brigidforge.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/staging-vault;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Staging API is at staging-beacon.brigidforge.com/api.
    # VITE_API_BASE_URL is set explicitly in .env.staging so this
    # proxy block is not strictly required, but kept for consistency.
    location /api/ {
        proxy_pass         https://staging-beacon.brigidforge.com/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              staging-beacon.brigidforge.com;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ~* \.(?:js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
