# Nginx server block for vault.brigidforge.com (Vault UI)
#
# Install:
#   cp ops/nginx/vault.brigidforge.com.conf /etc/nginx/sites-available/vault.brigidforge.com
#   ln -s /etc/nginx/sites-available/vault.brigidforge.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# TLS: obtain a cert with certbot before enabling the HTTPS block.
#   certbot --nginx -d vault.brigidforge.com

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name vault.brigidforge.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vault.brigidforge.com;

    # TLS — paths written by certbot
    ssl_certificate     /etc/letsencrypt/live/vault.brigidforge.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vault.brigidforge.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/vault;
    index index.html;

    # SPA fallback — send all non-file requests to index.html so that
    # React Router can handle /view/:vault and /operator/:vault client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api to the Beacon API (same host, internal port).
    # This keeps VITE_API_BASE_URL unset in production if you prefer
    # same-origin requests. Alternatively set VITE_API_BASE_URL in
    # apps/vault-ui/.env.production and remove this block.
    location /api/ {
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Cache hashed assets indefinitely; never cache index.html.
    location ~* \.(?:js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
